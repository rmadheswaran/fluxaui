<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing in…</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f9fafb;
      color: #374151;
    }
    .card {
      text-align: center;
      padding: 40px 32px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 360px;
      width: 90%;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e5e7eb;
      border-top-color: #4328fe;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { margin: 0 0 8px; font-size: 18px; font-weight: 600; }
    p  { margin: 0; font-size: 14px; color: #6b7280; }
    .success { color: #059669; }
    .error   { color: #dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h2 id="title">Signing you in…</h2>
    <p  id="msg">Please wait, this will close automatically.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code   = params.get("code");
    const state  = params.get("state");
    const error  = params.get("error");

    const payload = { type: "oauth_callback", code, state, error };

    function finish(isError) {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("title").textContent = isError ? "Sign-in failed" : "Signed in!";
      document.getElementById("title").className   = isError ? "error" : "success";
      document.getElementById("msg").textContent   = isError
        ? "Something went wrong — you can close this window."
        : "You can close this window now.";
      setTimeout(() => window.close(), 1500);
    }

    // Path 1: window.opener available (Figma desktop or non-sandboxed context)
    if (window.opener) {
      window.opener.postMessage(payload, "*");
      finish(!!error);
      return;
    }

    // Path 2: Relay via ntfy.sh so the plugin can poll for the result
    if (state) {
      fetch("https://ntfy.sh/fluxa-auth-" + state, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code, error }),
      })
        .then(() => finish(!!error))
        .catch(() => finish(true));
    } else {
      finish(true);
    }
  </script>
</body>
</html>
